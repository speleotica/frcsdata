- describe: trip dates
  specs:
    - it: date - SEPT 10, 1983
      procedure: parseFrcsSurveyFile
      input: |2
            cave
        trip
        Jim, Bob -  SEPT 10, 1983
         *
        FT C  DD
      output:
        cave: cave
        trips:
          - tripNumber: 1
            header:
              name: trip
              date: 1983-09-10
              team:
                - Jim
                - Bob
            units:
              distanceUnit: ft
              azimuthUnit: deg
              inclinationUnit: deg
              backsightAzimuthCorrected: true
              backsightInclinationCorrected: false
              hasBacksightAzimuth: true
              hasBacksightInclination: false
