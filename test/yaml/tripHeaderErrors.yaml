- describe: trip header errors
  specs:
    - it: invalid distance unit
      procedure: parseFrcsSurveyFile
      input: |2
         *
        trip
         *
        FH CC DD
      output:
        INVALID:
          trips:
            - INVALID:
                tripNumber: 1
                header:
                  name: trip
                units:
                  INVALID:
                    azimuthUnit: deg
                    inclinationUnit: deg
                    backsightAzimuthCorrected: true
                    backsightInclinationCorrected: true
                    hasBacksightAzimuth: true
                    hasBacksightInclination: true
                  issues:
                    - 0
                shots: []
        issues:
          - type: error
            code: invalidDistanceUnit
            message: Invalid distance unit
            loc:
              start: { line: 4, column: 0, index: 11 }
              end: { line: 4, column: 2, index: 13 }
    - it: invalid distance unit with data
      procedure: parseFrcsSurveyFile
      input: |2
         *
        trip
         *
        FH CC DD
         AE19 AE20   9.3    60.0  60.0-36.0       2 12  0 20
      output:
        INVALID:
          trips:
            - INVALID:
                tripNumber: 1
                header:
                  name: trip
                units:
                  INVALID:
                    azimuthUnit: deg
                    inclinationUnit: deg
                    backsightAzimuthCorrected: true
                    backsightInclinationCorrected: true
                    hasBacksightAzimuth: true
                    hasBacksightInclination: true
                  issues:
                    - 0
                shots:
                  - {
                      from: AE20,
                      to: AE19,
                      distance: [9.3, ft],
                      frontsightAzimuth: [60, deg],
                      frontsightInclination: [-36, deg],
                      backsightAzimuth: [60, deg],
                      toLruds:
                        {
                          left: [2, ft],
                          right: [12, ft],
                          up: [0, ft],
                          down: [20, ft],
                        },
                    }
        issues:
          - type: error
            code: invalidDistanceUnit
            message: Invalid distance unit
            loc:
              start: { line: 4, column: 0, index: 11 }
              end: { line: 4, column: 2, index: 13 }
