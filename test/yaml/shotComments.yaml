                    SUMMARY OF SIDE LEADS:

                    \    BTP18: Lower level mud crawl

                    \    BTP33: Upper canyon on left wall, 3Hx2W

                    \    BTR16: SE upper canyon lead.  Nice 5Hx4W dry gypsum.  Need rope

