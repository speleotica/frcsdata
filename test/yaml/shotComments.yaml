              azimuthUnit: deg
              inclinationUnit: deg
              backsightAzimuthCorrected: true
              backsightInclinationCorrected: true
              hasBacksightAzimuth: true
              hasBacksightInclination: true
            shots:
              - {
                  from: BTR36,
                  to: BTR37,
                  distance: [26.9, ft],
                  frontsightAzimuth: [285, deg],
                  frontsightInclination: [-1.5, deg],
                  backsightAzimuth: [284, deg],
                  backsightInclination: [-1, deg],
                  toLruds:
                    {
                      left: [9, ft],
                      right: [6, ft],
                      up: [7, ft],
                      down: [8, ft],
                    },
                  comment:
                    "Survey terminated at breakdown choke.  Passage might continue through

