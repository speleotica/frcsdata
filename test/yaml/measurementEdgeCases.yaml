- describe: measurement edge cases
  specs:
    - it: horizontal shot with omitted inclination
      procedure: parseFrcsSurveyFile
      input: |2
         *
        trip
         *
        FT CC DD
          B19  B17   8.4 *  13.5  13.8           12  0  4  3
      output:
        trips:
          - tripNumber: 1
            header:
              name: trip
            units:
              distanceUnit: ft
              azimuthUnit: deg
              inclinationUnit: deg
              backsightAzimuthCorrected: true
              backsightInclinationCorrected: true
              hasBacksightAzimuth: true
              hasBacksightInclination: true
            shots:
              - {
                  from: B17,
                  to: B19,
                  distance: [8.4, ft],
                  frontsightAzimuth: [13.5, deg],
                  backsightAzimuth: [13.8, deg],
                  frontsightInclination: [0, 'deg'],
                  toLruds:
                    {
                      left: [12, ft],
                      right: [0, ft],
                      up: [4, ft],
                      down: [3, ft],
                    },
                  excludeDistance: true,
                }
