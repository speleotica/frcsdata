            cave
        D TRAIL.
        Norm Pace, Don Mills, Rich Ely, George Miel. 12/25/65
        *** OLD CAVE SECTION ***
        ORIG 3B
         *
        FT CB DD
          A44  A43  57.9   177.0        0.0       9 11  0  0
        *

        D TRAIL.
        Norm Pace, Don Mills, Rich Ely, George Miel. 12/25/65
        ORIGINAL NOTES AVAILABLE.  DECLINATION NOT SPECIFIED
        XYZ COORDINATES VERIFIED WITH MINTON PRINTOUT

        Add date and crew per JWS cards and MIG Newsletter p46. Other surveys are
        part of this survey. Date only given as the first of 3 trips and several
        days over "Christmas". cjh 12/13/21
        The other surveys #17 (Dust Bin) and first 16 stations of #3 (A). 7/31/22

        *** OLD CAVE ***
        ORIG 14
        FT CB DD
        *
           D1  A35  70.0   334.0        0.0       0 12  1  2
