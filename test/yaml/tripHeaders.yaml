- describe: trip headers
  specs:
    - it: lowercases all-caps team member names
      procedure: parseFrcsSurveyFile
      input: |2
            Fisher Ridge Cave System, Hart Co., KY
        ENTRANCE DROPS, JOE'S "I LOVE MY WIFE TRAVERSE", TRICKY TRAVERSE
        PETER QUICK, KEITH ORTIZ   -  2-15-81
        This File has Crumps test connected.  11/20/12
         *
        FT C  DD
      output:
        cave: Fisher Ridge Cave System
        location: Hart Co., KY
        trips:
          - header:
              name: ENTRANCE DROPS, JOE'S "I LOVE MY WIFE TRAVERSE", TRICKY TRAVERSE
              comment: This File has Crumps test connected.  11/20/12
              date: 1981-02-15
              team:
                - Peter Quick
                - Keith Ortiz
            units:
              distanceUnit: ft
              azimuthUnit: deg
              inclinationUnit: deg
              backsightAzimuthCorrected: true
              backsightInclinationCorrected: false
              hasBacksightAzimuth: true
              hasBacksightInclination: false
            shots: []
    - it: replaces _ with space in team member names
      procedure: parseFrcsSurveyFile
